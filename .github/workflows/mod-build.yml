name: ET mod build (waypoint mod)

# Builds the ET mod libraries (qagame + cgame + ui) via the Makefile and verifies
# them, then assembles the official waypoint-mod zip layout. Linux for now
# (i386 + x86_64 + aarch64); Windows/Mac are a separate later step.
# Independent of the bot-engine workflows (cmake-build.yml / release.yml).

on:
  push:
    branches: [ stable ]
    paths:
      - '.github/workflows/mod-build.yml'
      - '0.83/GameInterfaces/ET/src/**'
      # qagame embeds the omni-bot interface/loader + headers from these dirs:
      - '0.83/Omnibot/Common/**'
      - '0.83/Omnibot/ET/**'
    # A 'mod-v*' tag publishes a pre-release (distinct from the bot-engine 'v*'
    # tag so tagging the engine never accidentally publishes the mod).
    tags: [ 'mod-v*' ]
  workflow_dispatch:

permissions:
  contents: write   # for the pre-release on a mod-v* tag

jobs:
  # aarch64 qagame is built NATIVELY on an arm runner (debian:11) - cross-compiling
  # for arm64 from x86 fights Debian's header layout. Official ships only qagame for
  # arm64 (no aarch64 cgame/ui).
  qagame-aarch64:
    runs-on: ubuntu-24.04-arm
    container: debian:11
    steps:
      - name: Toolchain (debian container)
        run: |
          set -e
          retry() { for i in 1 2 3 4 5; do "$@" && return 0; echo "retry $i..."; sleep 10; done; return 1; }
          retry apt-get update
          retry apt-get install -y --no-install-recommends \
            ca-certificates git build-essential make file

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build + verify qagame.mp.aarch64.so (native)
        run: |
          set -e
          cd 0.83/GameInterfaces/ET/src
          make -j"$(nproc)" ARCH=aarch64 qagame
          lib=qagame.mp.aarch64.so
          file "$lib" | grep -q "ARM aarch64" || { echo "FAIL: wrong arch $(file -b "$lib")"; exit 1; }
          nm -D --defined-only "$lib" | grep -qw vmMain   || { echo "FAIL: no vmMain";   exit 1; }
          nm -D --defined-only "$lib" | grep -qw dllEntry || { echo "FAIL: no dllEntry"; exit 1; }
          echo "OK: $lib | $(file -b "$lib" | cut -d, -f1-2)"
          mkdir -p "$GITHUB_WORKSPACE/arm" && cp "$lib" "$GITHUB_WORKSPACE/arm/"

      - uses: actions/upload-artifact@v4
        with:
          name: qagame-aarch64
          path: arm/qagame.mp.aarch64.so
          retention-days: 1

  build:
    needs: qagame-aarch64
    runs-on: ubuntu-latest
    # debian:11 (glibc 2.31) for broad compatibility with old ET servers.
    container: debian:11
    steps:
      - name: Toolchain (debian container)
        # Bare container: install before checkout (needs git). No sudo as root.
        run: |
          set -e
          retry() { for i in 1 2 3 4 5; do "$@" && return 0; echo "retry $i..."; sleep 10; done; return 1; }
          dpkg --add-architecture i386
          retry apt-get update
          retry apt-get install -y --no-install-recommends \
            ca-certificates git build-essential make gcc-multilib g++-multilib \
            gcc-mingw-w64 g++-mingw-w64 \
            zip unzip curl file

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build mod libs (i386 + x86_64)
        # The Makefile uses a shared build/ obj dir without arch in the path, so the
        # obj dir MUST be wiped between architectures (else 32-bit objects would be
        # relinked for 64-bit). The .so outputs live in src/ and are not under build/.
        run: |
          set -e
          cd 0.83/GameInterfaces/ET/src
          make -j"$(nproc)" ARCH=i386   qagame cgame ui
          rm -rf build
          make -j"$(nproc)" ARCH=x86_64 qagame cgame ui
          mkdir -p "$GITHUB_WORKSPACE/modlibs"
          cp qagame.mp.i386.so   cgame.mp.i386.so   ui.mp.i386.so \
             qagame.mp.x86_64.so cgame.mp.x86_64.so ui.mp.x86_64.so "$GITHUB_WORKSPACE/modlibs/"

      - name: Build Windows DLLs (MinGW cross, x64 + x86)
        run: |
          set -e
          cd 0.83/GameInterfaces/ET/src
          rm -rf build
          make -j"$(nproc)" WIN=x64 CC=x86_64-w64-mingw32-gcc CXX=x86_64-w64-mingw32-g++ qagame cgame ui
          rm -rf build
          make -j"$(nproc)" WIN=x86 CC=i686-w64-mingw32-gcc   CXX=i686-w64-mingw32-g++   qagame cgame ui
          cp qagame_mp_x64.dll cgame_mp_x64.dll ui_mp_x64.dll \
             qagame_mp_x86.dll cgame_mp_x86.dll ui_mp_x86.dll "$GITHUB_WORKSPACE/modlibs/"

      - name: Download native aarch64 qagame
        uses: actions/download-artifact@v4
        with:
          name: qagame-aarch64
          path: modlibs

      - name: Verify mod libs (ELF arch, vmMain+dllEntry, sane NEEDED)
        # Mandatory gate: the job fails if any .so is missing, the wrong arch, does
        # not export the ET entry points, or pulls in an unexpected shared library.
        run: |
          set -e
          cd "$GITHUB_WORKSPACE/modlibs"
          ls -la
          check() {
            lib="$1"; want="$2"
            [ -f "$lib" ] || { echo "FAIL: $lib missing"; exit 1; }
            file "$lib" | grep -q "$want" || { echo "FAIL: $lib wrong arch: $(file -b "$lib")"; exit 1; }
            nm -D --defined-only "$lib" | grep -qw vmMain   || { echo "FAIL: $lib does not export vmMain"; exit 1; }
            nm -D --defined-only "$lib" | grep -qw dllEntry || { echo "FAIL: $lib does not export dllEntry"; exit 1; }
            # Only standard C/C++ runtime libs are allowed in NEEDED.
            bad=$(objdump -p "$lib" | awk '/NEEDED/{print $2}' | grep -vE '^lib(c|m|dl|pthread|stdc\+\+|gcc_s)\.so' || true)
            [ -z "$bad" ] || { echo "FAIL: $lib has unexpected NEEDED: $bad"; exit 1; }
            glibc=$(objdump -T "$lib" | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sed 's/GLIBC_//' | sort -V | tail -1)
            echo "OK: $lib | $(file -b "$lib" | cut -d, -f1-2) | exports vmMain+dllEntry | glibc floor ${glibc:-none}"
          }
          check qagame.mp.i386.so    "Intel 80386"
          check cgame.mp.i386.so     "Intel 80386"
          check ui.mp.i386.so        "Intel 80386"
          check qagame.mp.x86_64.so  "x86-64"
          check cgame.mp.x86_64.so   "x86-64"
          check ui.mp.x86_64.so      "x86-64"
          check qagame.mp.aarch64.so "ARM aarch64"
          # Windows DLLs: PE arch, vmMain+dllEntry exports, no MinGW runtime DLLs.
          checkwin() {
            dll="$1"; want="$2"
            [ -f "$dll" ] || { echo "FAIL: $dll missing"; exit 1; }
            file "$dll" | grep -q "$want" || { echo "FAIL: $dll wrong arch: $(file -b "$dll")"; exit 1; }
            objdump -p "$dll" | grep -qw vmMain   || { echo "FAIL: $dll does not export vmMain"; exit 1; }
            objdump -p "$dll" | grep -qw dllEntry || { echo "FAIL: $dll does not export dllEntry"; exit 1; }
            bad=$(objdump -p "$dll" | awk '/DLL Name:/{print $3}' | grep -iE 'libgcc|libstdc|libwinpthread' || true)
            [ -z "$bad" ] || { echo "FAIL: $dll needs a MinGW runtime DLL: $bad"; exit 1; }
            echo "OK: $dll | $(file -b "$dll" | cut -d, -f1-2) | exports vmMain+dllEntry | imports $(objdump -p "$dll" | awk '/DLL Name:/{print $3}' | tr '\n' ' ')"
          }
          checkwin qagame_mp_x64.dll "x86-64"
          checkwin cgame_mp_x64.dll  "x86-64"
          checkwin ui_mp_x64.dll     "x86-64"
          checkwin qagame_mp_x86.dll "Intel 80386"
          checkwin cgame_mp_x86.dll  "Intel 80386"
          checkwin ui_mp_x86.dll     "Intel 80386"

      - uses: actions/upload-artifact@v4
        with:
          name: et-mod-libs
          path: modlibs/*
          retention-days: 7

      - name: pk3 + README aus offiziellem 0.93-Mod-Zip holen (Schritt 2)
        # No omnibot_et.pk3 source exists in the repo, so take the official asset
        # pk3 (and README) from the official ET waypoint mod as the source.
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          curl -fL -o official_mod.zip \
            https://github.com/jswigart/omni-bot/releases/download/0.93/omni-bot_0_93_ET_waypoint_mod.zip
          rm -rf official && mkdir official && (cd official && unzip -q ../official_mod.zip)
          test -f official/omnibot/omnibot_et.pk3   || { echo "FAIL: official omnibot_et.pk3 missing"; exit 1; }
          test -f official/README-omnibot_mod.txt   || { echo "FAIL: official README missing"; exit 1; }

      - name: Mod-Zip im offiziellen Layout bauen (Block 1c + 2)
        # Replicate the official layout 1:1, swapping in OUR builds:
        #   omnibot/         -> qagame loose (linux i386/x86_64/aarch64 + win x64/x86 ours)
        #   omnibot_et.pk3   -> cgame + ui INSIDE the pk3 (linux i386/x86_64 + win x64/x86 ours)
        #   README-omnibot_mod.txt at the zip root.
        # Only mac libs stay stock (Block 3).
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          VER=$(grep -oP '#define OMNIBOT_VERSION "\K[^"]+' 0.83/Omnibot/Common/IGame.h)
          VERTAG=$(echo "$VER" | tr '.' '_')
          echo "mod version: $VER -> $VERTAG"
          rm -rf dist mod pk3 && mkdir -p dist

          # 1) start from the official mod layout (omnibot/ + README)
          mkdir mod && (cd mod && unzip -q ../official_mod.zip)

          # 2) qagame: swap our builds loose in omnibot/ (mac stays stock)
          for f in qagame.mp.i386.so qagame.mp.x86_64.so qagame.mp.aarch64.so \
                   qagame_mp_x64.dll qagame_mp_x86.dll; do
            cp modlibs/$f mod/omnibot/$f
          done

          # 3) cgame + ui: swap our builds INSIDE the pk3 (mac stays stock)
          mkdir pk3 && (cd pk3 && unzip -q ../mod/omnibot/omnibot_et.pk3)
          for f in cgame.mp.i386.so cgame.mp.x86_64.so ui.mp.i386.so ui.mp.x86_64.so \
                   cgame_mp_x64.dll cgame_mp_x86.dll ui_mp_x64.dll ui_mp_x86.dll; do
            cp modlibs/$f pk3/$f
          done
          rm -f mod/omnibot/omnibot_et.pk3
          (cd pk3 && zip -rqX ../mod/omnibot/omnibot_et.pk3 .)

          # 4) verify the swap actually put OUR builds in place
          for f in qagame.mp.i386.so qagame.mp.x86_64.so qagame.mp.aarch64.so \
                   qagame_mp_x64.dll qagame_mp_x86.dll; do
            cmp -s mod/omnibot/$f modlibs/$f || { echo "FAIL: omnibot/$f is not our build"; exit 1; }
          done
          for f in cgame.mp.i386.so cgame.mp.x86_64.so ui.mp.i386.so ui.mp.x86_64.so \
                   cgame_mp_x64.dll cgame_mp_x86.dll ui_mp_x64.dll ui_mp_x86.dll; do
            cmp -s pk3/$f modlibs/$f || { echo "FAIL: pk3/$f is not our build"; exit 1; }
          done

          # 5) re-zip the whole mod
          ZIP="dist/omni-bot_${VERTAG}_ET_waypoint_mod.zip"
          (cd mod && zip -rqX "../$ZIP" .)
          ( cd dist && sha256sum *.zip > SHA256SUMS )
          echo "=== zip layout ==="; unzip -l "$ZIP"
          echo "=== pk3 contents ==="; unzip -l mod/omnibot/omnibot_et.pk3

      - uses: actions/upload-artifact@v4
        with:
          name: et-waypoint-mod
          path: dist/*
          retention-days: 7

      - name: Pre-Release (nur bei mod-v* Tag, Schritt 4)
        if: startsWith(github.ref, 'refs/tags/mod-v')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            dist/omni-bot_*_ET_waypoint_mod.zip
            dist/SHA256SUMS
