name: ET mod build (waypoint mod)

# Builds the ET mod libraries (qagame + cgame + ui) via the Makefile and verifies
# them, then assembles the official waypoint-mod zip layout. Linux for now
# (i386 + x86_64 + aarch64); Windows/Mac are a separate later step.
# Independent of the bot-engine workflows (cmake-build.yml / release.yml).

on:
  push:
    branches: [ stable ]
    paths:
      - '.github/workflows/mod-build.yml'
      - '0.83/GameInterfaces/ET/src/**'
      # qagame embeds the omni-bot interface/loader + headers from these dirs:
      - '0.83/Omnibot/Common/**'
      - '0.83/Omnibot/ET/**'
  workflow_dispatch:
  # Called by release.yml so a single v* tag builds engine + mod into ONE release.
  workflow_call:

jobs:
  # aarch64 qagame is built NATIVELY on an arm runner (debian:11) - cross-compiling
  # for arm64 from x86 fights Debian's header layout. Official ships only qagame for
  # arm64 (no aarch64 cgame/ui).
  qagame-aarch64:
    runs-on: ubuntu-24.04-arm
    container: debian:11
    steps:
      - name: Toolchain (debian container)
        run: |
          set -e
          retry() { for i in 1 2 3 4 5; do "$@" && return 0; echo "retry $i..."; sleep 10; done; return 1; }
          retry apt-get update
          retry apt-get install -y --no-install-recommends \
            ca-certificates git build-essential make file

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build + verify qagame.mp.aarch64.so (native)
        run: |
          set -e
          cd 0.83/GameInterfaces/ET/src
          make -j"$(nproc)" ARCH=aarch64 qagame
          lib=qagame.mp.aarch64.so
          file "$lib" | grep -q "ARM aarch64" || { echo "FAIL: wrong arch $(file -b "$lib")"; exit 1; }
          nm -D --defined-only "$lib" | grep -qw vmMain   || { echo "FAIL: no vmMain";   exit 1; }
          nm -D --defined-only "$lib" | grep -qw dllEntry || { echo "FAIL: no dllEntry"; exit 1; }
          echo "OK: $lib | $(file -b "$lib" | cut -d, -f1-2)"
          mkdir -p "$GITHUB_WORKSPACE/arm" && cp "$lib" "$GITHUB_WORKSPACE/arm/"

      - uses: actions/upload-artifact@v4
        with:
          name: qagame-aarch64
          path: arm/qagame.mp.aarch64.so
          retention-days: 1

  # Mac libs are built NATIVELY on a macos-latest runner (legit Xcode + SDK, no
  # osxcross/SDK-licensing problem). Universal x86_64+arm64 Mach-O, like official.
  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build + verify mac libs (universal Mach-O)
        run: |
          set -e
          cd 0.83/GameInterfaces/ET/src
          make -j"$(sysctl -n hw.ncpu)" MAC=1 CC=clang CXX=clang++ qagame cgame ui
          checkmac() {
            lib="$1"
            [ -f "$lib" ] || { echo "FAIL: $lib missing"; exit 1; }
            file "$lib" | grep -q "Mach-O universal" || { echo "FAIL: $lib not universal: $(file -b "$lib")"; exit 1; }
            for a in x86_64 arm64; do
              lipo "$lib" -verify_arch "$a" || { echo "FAIL: $lib missing arch $a"; exit 1; }
            done
            nm -gj "$lib" | grep -qx _vmMain   || { echo "FAIL: $lib does not export vmMain";   exit 1; }
            nm -gj "$lib" | grep -qx _dllEntry || { echo "FAIL: $lib does not export dllEntry"; exit 1; }
            echo "OK: $lib | $(lipo -archs "$lib") | exports vmMain+dllEntry"
          }
          checkmac qagame_mac
          checkmac cgame_mac
          checkmac ui_mac
          mkdir -p "$GITHUB_WORKSPACE/macout"
          cp qagame_mac cgame_mac ui_mac "$GITHUB_WORKSPACE/macout/"

      - uses: actions/upload-artifact@v4
        with:
          name: et-mac-libs
          path: macout/*
          retention-days: 1

  # Windows libs built with MSVC (v143) via the existing vcxproj, so they share the
  # MSVC C++ ABI of omnibot_et.dll. MinGW (GCC ABI) crashed ET:Legacy at waypoint
  # drawing (this in ECX vs on-stack mismatch across the IClientInterface vtable).
  windows-msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build mod DLLs (MSVC v143, vcxproj)
        shell: pwsh
        run: |
          cd 0.83\GameInterfaces\ET\src
          # Paths.props derives REPO_ROOT from $(SolutionDir) (unset when building a
          # vcxproj directly) and a property sheet overrides env vars, so REPO_ROOT
          # and BOOST MUST be passed as command-line /p: properties (highest
          # precedence). BOOST is referenced but the mod C++ pulls no boost -> dummy.
          $repo = "$env:GITHUB_WORKSPACE\0.83"
          $projects = @("cgame\cgame.vcxproj","game\game.vcxproj","ui\ui.vcxproj")
          foreach ($p in $projects) {
            foreach ($plat in @("Win32","x64")) {
              Write-Host "==> msbuild $p $plat"
              # Release pins v120_xp (not on the runner) -> override to v143.
              # PostBuildEvent copies into a local ET install -> disable in CI.
              msbuild $p /p:Configuration=Release /p:Platform=$plat /p:PlatformToolset=v143 /p:PostBuildEventUseInBuild=false /p:REPO_ROOT=$repo /p:BOOST=$repo /m /v:m /nologo
              if ($LASTEXITCODE -ne 0) { throw "msbuild failed: $p $plat" }
            }
          }
          $out = "$env:GITHUB_WORKSPACE\winlibs"; New-Item -ItemType Directory -Force -Path $out | Out-Null
          Get-ChildItem -Recurse -Path build -Filter "*_mp_*.dll" | ForEach-Object {
            Write-Host "found $($_.FullName)"; Copy-Item $_.FullName $out -Force
          }
          foreach ($n in "qagame_mp_x86.dll","cgame_mp_x86.dll","ui_mp_x86.dll",
                         "qagame_mp_x64.dll","cgame_mp_x64.dll","ui_mp_x64.dll") {
            if (!(Test-Path "$out\$n")) { throw "missing $n" }
          }
          Get-ChildItem $out | ForEach-Object { Write-Host $_.Name }

      - uses: actions/upload-artifact@v4
        with:
          name: et-mod-libs-win
          path: winlibs/*
          retention-days: 1

  build:
    needs: [ qagame-aarch64, mac, windows-msvc ]
    runs-on: ubuntu-latest
    # debian:11 (glibc 2.31) for broad compatibility with old ET servers.
    container: debian:11
    steps:
      - name: Toolchain (debian container)
        # Bare container: install before checkout (needs git). No sudo as root.
        run: |
          set -e
          retry() { for i in 1 2 3 4 5; do "$@" && return 0; echo "retry $i..."; sleep 10; done; return 1; }
          dpkg --add-architecture i386
          retry apt-get update
          retry apt-get install -y --no-install-recommends \
            ca-certificates git build-essential make gcc-multilib g++-multilib \
            zip unzip curl file

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build mod libs (i386 + x86_64)
        # The Makefile uses a shared build/ obj dir without arch in the path, so the
        # obj dir MUST be wiped between architectures (else 32-bit objects would be
        # relinked for 64-bit). The .so outputs live in src/ and are not under build/.
        run: |
          set -e
          cd 0.83/GameInterfaces/ET/src
          make -j"$(nproc)" ARCH=i386   qagame cgame ui
          rm -rf build
          make -j"$(nproc)" ARCH=x86_64 qagame cgame ui
          mkdir -p "$GITHUB_WORKSPACE/modlibs"
          cp qagame.mp.i386.so   cgame.mp.i386.so   ui.mp.i386.so \
             qagame.mp.x86_64.so cgame.mp.x86_64.so ui.mp.x86_64.so "$GITHUB_WORKSPACE/modlibs/"

      - name: Download Windows MSVC DLLs
        uses: actions/download-artifact@v4
        with:
          name: et-mod-libs-win
          path: modlibs

      - name: Download native aarch64 qagame
        uses: actions/download-artifact@v4
        with:
          name: qagame-aarch64
          path: modlibs

      - name: Download native mac libs
        uses: actions/download-artifact@v4
        with:
          name: et-mac-libs
          path: modlibs

      - name: Verify mod libs (ELF arch, vmMain+dllEntry, sane NEEDED)
        # Mandatory gate: the job fails if any .so is missing, the wrong arch, does
        # not export the ET entry points, or pulls in an unexpected shared library.
        run: |
          set -e
          cd "$GITHUB_WORKSPACE/modlibs"
          ls -la
          check() {
            lib="$1"; want="$2"
            [ -f "$lib" ] || { echo "FAIL: $lib missing"; exit 1; }
            file "$lib" | grep -q "$want" || { echo "FAIL: $lib wrong arch: $(file -b "$lib")"; exit 1; }
            nm -D --defined-only "$lib" | grep -qw vmMain   || { echo "FAIL: $lib does not export vmMain"; exit 1; }
            nm -D --defined-only "$lib" | grep -qw dllEntry || { echo "FAIL: $lib does not export dllEntry"; exit 1; }
            # Only standard C/C++ runtime libs are allowed in NEEDED.
            # libstdc++/libgcc_s must be STATICALLY linked (else ET:Legacy crashes on
            # a too-new GLIBCXX) - so they must NOT appear as a dynamic NEEDED. Allow
            # only the base system libs + the dynamic linker (ld-linux*, which
            # -static-libgcc surfaces as a NEEDED on i386).
            bad=$(objdump -p "$lib" | awk '/NEEDED/{print $2}' | grep -vE '^(lib(c|m|dl|pthread)\.so|ld-linux)' || true)
            [ -z "$bad" ] || { echo "FAIL: $lib has unexpected NEEDED (dynamic libstdc++/libgcc_s?): $bad"; exit 1; }
            glibc=$(objdump -T "$lib" | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sed 's/GLIBC_//' | sort -V | tail -1)
            echo "OK: $lib | $(file -b "$lib" | cut -d, -f1-2) | exports vmMain+dllEntry | glibc floor ${glibc:-none}"
          }
          check qagame.mp.i386.so    "Intel 80386"
          check cgame.mp.i386.so     "Intel 80386"
          check ui.mp.i386.so        "Intel 80386"
          check qagame.mp.x86_64.so  "x86-64"
          check cgame.mp.x86_64.so   "x86-64"
          check ui.mp.x86_64.so      "x86-64"
          check qagame.mp.aarch64.so "ARM aarch64"
          # Windows DLLs: PE arch, vmMain+dllEntry exports, no MinGW runtime DLLs.
          checkwin() {
            dll="$1"; want="$2"
            [ -f "$dll" ] || { echo "FAIL: $dll missing"; exit 1; }
            file "$dll" | grep -q "$want" || { echo "FAIL: $dll wrong arch: $(file -b "$dll")"; exit 1; }
            objdump -p "$dll" | grep -qw vmMain   || { echo "FAIL: $dll does not export vmMain"; exit 1; }
            objdump -p "$dll" | grep -qw dllEntry || { echo "FAIL: $dll does not export dllEntry"; exit 1; }
            # MSVC build -> must NOT depend on a MinGW runtime DLL...
            bad=$(objdump -p "$dll" | awk '/DLL Name:/{print $3}' | grep -iE 'libgcc|libstdc|libwinpthread' || true)
            [ -z "$bad" ] || { echo "FAIL: $dll needs a MinGW runtime DLL: $bad"; exit 1; }
            # ...and must carry no GCC marker (the MinGW ABI is what crashed ET:Legacy).
            if strings "$dll" | grep -q 'GCC: (GNU)'; then echo "FAIL: $dll still built with GCC/MinGW (wrong C++ ABI)"; exit 1; fi
            echo "OK: $dll | $(file -b "$dll" | cut -d, -f1-2) | exports vmMain+dllEntry | imports $(objdump -p "$dll" | awk '/DLL Name:/{print $3}' | tr '\n' ' ')"
          }
          checkwin qagame_mp_x64.dll "x86-64"
          checkwin cgame_mp_x64.dll  "x86-64"
          checkwin ui_mp_x64.dll     "x86-64"
          checkwin qagame_mp_x86.dll "Intel 80386"
          checkwin cgame_mp_x86.dll  "Intel 80386"
          checkwin ui_mp_x86.dll     "Intel 80386"
          # Mac libs: basic Mach-O universal check here (deep check ran in the mac job).
          for m in qagame_mac cgame_mac ui_mac; do
            [ -f "$m" ] || { echo "FAIL: $m missing"; exit 1; }
            file "$m" | grep -q "Mach-O universal" || { echo "FAIL: $m not universal: $(file -b "$m")"; exit 1; }
            echo "OK: $m | $(file -b "$m" | cut -d, -f1)"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: et-mod-libs
          path: modlibs/*
          retention-days: 7

      - name: pk3 + README aus offiziellem 0.93-Mod-Zip holen (Schritt 2)
        # No omnibot_et.pk3 source exists in the repo, so take the official asset
        # pk3 (and README) from the official ET waypoint mod as the source.
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          curl -fL -o official_mod.zip \
            https://github.com/jswigart/omni-bot/releases/download/0.93/omni-bot_0_93_ET_waypoint_mod.zip
          rm -rf official && mkdir official && (cd official && unzip -q ../official_mod.zip)
          test -f official/omnibot/omnibot_et.pk3   || { echo "FAIL: official omnibot_et.pk3 missing"; exit 1; }
          test -f official/README-omnibot_mod.txt   || { echo "FAIL: official README missing"; exit 1; }

      - name: Mod-Zip im offiziellen Layout bauen (alle 6 Plattformen)
        # Replicate the official layout 1:1 with OUR builds on every platform:
        #   omnibot/         -> qagame loose (linux i386/x86_64/aarch64 + win x64/x86 + mac)
        #   omnibot_et.pk3   -> cgame + ui INSIDE the pk3 (linux i386/x86_64 + win x64/x86 + mac)
        #   README-omnibot_mod.txt at the zip root.
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          VER=$(grep -oP '#define OMNIBOT_VERSION "\K[^"]+' 0.83/Omnibot/Common/IGame.h)
          VERTAG=$(echo "$VER" | tr '.' '_')
          echo "mod version: $VER -> $VERTAG"
          rm -rf dist mod pk3 && mkdir -p dist

          # 1) start from the official mod layout (omnibot/ + README)
          mkdir mod && (cd mod && unzip -q ../official_mod.zip)

          # 2) qagame: swap our builds loose in omnibot/ (all platforms)
          QAGAME_LOOSE="qagame.mp.i386.so qagame.mp.x86_64.so qagame.mp.aarch64.so \
                        qagame_mp_x64.dll qagame_mp_x86.dll qagame_mac"
          for f in $QAGAME_LOOSE; do cp modlibs/$f mod/omnibot/$f; done

          # 3) cgame + ui: swap our builds INSIDE the pk3 (all platforms)
          PK3_LIBS="cgame.mp.i386.so cgame.mp.x86_64.so ui.mp.i386.so ui.mp.x86_64.so \
                    cgame_mp_x64.dll cgame_mp_x86.dll ui_mp_x64.dll ui_mp_x86.dll \
                    cgame_mac ui_mac"
          mkdir pk3 && (cd pk3 && unzip -q ../mod/omnibot/omnibot_et.pk3)
          for f in $PK3_LIBS; do cp modlibs/$f pk3/$f; done
          rm -f mod/omnibot/omnibot_et.pk3
          (cd pk3 && zip -rqX ../mod/omnibot/omnibot_et.pk3 .)

          # 4) verify the swap actually put OUR builds in place (every platform)
          for f in $QAGAME_LOOSE; do
            cmp -s mod/omnibot/$f modlibs/$f || { echo "FAIL: omnibot/$f is not our build"; exit 1; }
          done
          for f in $PK3_LIBS; do
            cmp -s pk3/$f modlibs/$f || { echo "FAIL: pk3/$f is not our build"; exit 1; }
          done

          # 5) re-zip the whole mod
          ZIP="dist/omni-bot_${VERTAG}_ET_waypoint_mod.zip"
          (cd mod && zip -rqX "../$ZIP" .)
          ( cd dist && sha256sum *.zip > SHA256SUMS )
          echo "=== zip layout ==="; unzip -l "$ZIP"
          echo "=== pk3 contents ==="; unzip -l mod/omnibot/omnibot_et.pk3

      - uses: actions/upload-artifact@v4
        with:
          name: et-waypoint-mod
          path: dist/*
          retention-days: 7
