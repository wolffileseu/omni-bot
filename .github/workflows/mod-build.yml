name: ET mod build (waypoint mod)

# Builds the ET mod libraries (qagame + cgame) via the Makefile and verifies them.
# Linux only for now (i386 + x86_64). Windows/Mac/ARM are a separate later step.
# Independent of the bot-engine workflows (cmake-build.yml / release.yml).

on:
  push:
    branches: [ stable ]
    paths:
      - '.github/workflows/mod-build.yml'
      - '0.83/GameInterfaces/ET/src/**'
      # qagame embeds the omni-bot interface/loader + headers from these dirs:
      - '0.83/Omnibot/Common/**'
      - '0.83/Omnibot/ET/**'
    # A 'mod-v*' tag publishes a pre-release (distinct from the bot-engine 'v*'
    # tag so tagging the engine never accidentally publishes the mod).
    tags: [ 'mod-v*' ]
  workflow_dispatch:

permissions:
  contents: write   # for the pre-release on a mod-v* tag

jobs:
  build:
    runs-on: ubuntu-latest
    # debian:11 (glibc 2.31) for broad compatibility with old ET servers.
    container: debian:11
    steps:
      - name: Toolchain (debian container)
        # Bare container: install before checkout (needs git). No sudo as root.
        run: |
          set -e
          retry() { for i in 1 2 3 4 5; do "$@" && return 0; echo "retry $i..."; sleep 10; done; return 1; }
          dpkg --add-architecture i386
          retry apt-get update
          retry apt-get install -y --no-install-recommends \
            ca-certificates git build-essential make gcc-multilib g++-multilib \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            zip unzip curl file

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build mod libs (i386 + x86_64)
        # The Makefile uses a shared build/ obj dir without arch in the path, so the
        # obj dir MUST be wiped between architectures (else 32-bit objects would be
        # relinked for 64-bit). The .so outputs live in src/ and are not under build/.
        run: |
          set -e
          cd 0.83/GameInterfaces/ET/src
          make -j"$(nproc)" ARCH=i386   qagame cgame ui
          rm -rf build
          make -j"$(nproc)" ARCH=x86_64 qagame cgame ui
          rm -rf build
          # aarch64: official ships only qagame for arm64 (no cgame/ui), cross-compiled.
          make -j"$(nproc)" ARCH=aarch64 CC=aarch64-linux-gnu-gcc CXX=aarch64-linux-gnu-g++ qagame
          mkdir -p "$GITHUB_WORKSPACE/modlibs"
          cp qagame.mp.i386.so   cgame.mp.i386.so   ui.mp.i386.so \
             qagame.mp.x86_64.so cgame.mp.x86_64.so ui.mp.x86_64.so \
             qagame.mp.aarch64.so "$GITHUB_WORKSPACE/modlibs/"
          ls -la "$GITHUB_WORKSPACE/modlibs"

      - name: Verify mod libs (ELF arch, vmMain+dllEntry, sane NEEDED)
        # Mandatory gate: the job fails if any .so is missing, the wrong arch, does
        # not export the ET entry points, or pulls in an unexpected shared library.
        run: |
          set -e
          cd "$GITHUB_WORKSPACE/modlibs"
          check() {
            lib="$1"; want="$2"
            [ -f "$lib" ] || { echo "FAIL: $lib missing"; exit 1; }
            file "$lib" | grep -q "$want" || { echo "FAIL: $lib wrong arch: $(file -b "$lib")"; exit 1; }
            nm -D --defined-only "$lib" | grep -qw vmMain   || { echo "FAIL: $lib does not export vmMain"; exit 1; }
            nm -D --defined-only "$lib" | grep -qw dllEntry || { echo "FAIL: $lib does not export dllEntry"; exit 1; }
            # Only standard C/C++ runtime libs are allowed in NEEDED.
            bad=$(objdump -p "$lib" | awk '/NEEDED/{print $2}' | grep -vE '^lib(c|m|dl|pthread|stdc\+\+|gcc_s)\.so' || true)
            [ -z "$bad" ] || { echo "FAIL: $lib has unexpected NEEDED: $bad"; exit 1; }
            glibc=$(objdump -T "$lib" | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sed 's/GLIBC_//' | sort -V | tail -1)
            echo "OK: $lib | $(file -b "$lib" | cut -d, -f1-2) | exports vmMain+dllEntry | glibc floor ${glibc:-none}"
          }
          check qagame.mp.i386.so   "Intel 80386"
          check cgame.mp.i386.so    "Intel 80386"
          check ui.mp.i386.so       "Intel 80386"
          check qagame.mp.x86_64.so "x86-64"
          check cgame.mp.x86_64.so  "x86-64"
          check ui.mp.x86_64.so     "x86-64"
          check qagame.mp.aarch64.so "ARM aarch64"

      - uses: actions/upload-artifact@v4
        with:
          name: et-mod-libs
          path: modlibs/*
          retention-days: 7

      - name: pk3 + README aus offiziellem 0.93-Mod-Zip holen (Schritt 2)
        # No omnibot_et.pk3 source exists in the repo, so take the official asset
        # pk3 (and README) from the official ET waypoint mod as the source.
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          curl -fL -o official_mod.zip \
            https://github.com/jswigart/omni-bot/releases/download/0.93/omni-bot_0_93_ET_waypoint_mod.zip
          rm -rf official && mkdir official && (cd official && unzip -q ../official_mod.zip)
          test -f official/omnibot/omnibot_et.pk3   || { echo "FAIL: official omnibot_et.pk3 missing"; exit 1; }
          test -f official/README-omnibot_mod.txt   || { echo "FAIL: official README missing"; exit 1; }

      - name: Mod-Zip im offiziellen Layout bauen (Schritt 3, nur Linux)
        # Official layout: omnibot/ with the .so libs + omnibot_et.pk3, and
        # README-omnibot_mod.txt at the zip root. Linux only for now (i386 +
        # x86_64); windows/mac/arm are a separate later step.
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          VER=$(grep -oP '#define OMNIBOT_VERSION "\K[^"]+' 0.83/Omnibot/Common/IGame.h)
          VERTAG=$(echo "$VER" | tr '.' '_')
          echo "mod version: $VER -> $VERTAG"
          rm -rf dist mod && mkdir -p dist mod/omnibot
          cp modlibs/qagame.mp.i386.so   modlibs/qagame.mp.x86_64.so \
             modlibs/cgame.mp.i386.so    modlibs/cgame.mp.x86_64.so   mod/omnibot/
          cp official/omnibot/omnibot_et.pk3 mod/omnibot/
          cp official/README-omnibot_mod.txt mod/
          ZIP="dist/omni-bot_${VERTAG}_ET_waypoint_mod.zip"
          (cd mod && zip -rq "../$ZIP" .)
          ( cd dist && sha256sum *.zip > SHA256SUMS )
          echo "=== zip layout ==="; unzip -l "$ZIP"

      - uses: actions/upload-artifact@v4
        with:
          name: et-waypoint-mod
          path: dist/*
          retention-days: 7

      - name: Pre-Release (nur bei mod-v* Tag, Schritt 4)
        if: startsWith(github.ref, 'refs/tags/mod-v')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            dist/omni-bot_*_ET_waypoint_mod.zip
            dist/SHA256SUMS
