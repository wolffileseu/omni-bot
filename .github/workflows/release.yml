name: Build & Release omni-bot (name fix)

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read   # needed to download the cmake-build artifact (win/mac/arm libs)

env:
  ET_URL:   https://github.com/jswigart/omni-bot/releases/download/0.93/omni-bot_0_93_ET.zip
  RTCW_URL: https://github.com/jswigart/omni-bot/releases/download/0.93/omni-bot_0_93_RTCW.zip
  ET_SHA:   a1b0cf22e756dcde714078cf691bebf7eadd260adffd92b6d4ec30d60925ec9b
  RTCW_SHA: 6275af05c97016636aa810b41f7521a74b09655bbf02beda83f862c831bf2418

jobs:
  build:
    runs-on: ubuntu-latest
    # Build inside debian:11 (glibc 2.31) so the produced .so loads on old game
    # servers (ubuntu-latest's GCC pulls in a too-new GLIBCXX/glibc otherwise).
    container: debian:11
    steps:
      - name: Toolchain (debian container)
        # Bare container: install before checkout (needs git). No sudo as root.
        # Retry apt to ride out transient Debian mirror resets.
        run: |
          set -e
          retry() { for i in 1 2 3 4 5; do "$@" && return 0; echo "retry $i..."; sleep 10; done; return 1; }
          dpkg --add-architecture i386
          retry apt-get update
          retry apt-get install -y --no-install-recommends \
            ca-certificates git build-essential cmake zip unzip curl file jq \
            gcc-multilib g++-multilib

      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: GameMonkey beschaffen (relatives Submodul umgehen)
        run: |
          git clone --depth 1 https://github.com/jswigart/gmscriptex.git /tmp/gms
          rm -rf 0.83/Omnibot/dependencies/gmscriptex
          mkdir -p 0.83/Omnibot/dependencies/gmscriptex
          cp -r /tmp/gms/gmsrc_ex 0.83/Omnibot/dependencies/gmscriptex/
          test -f 0.83/Omnibot/dependencies/gmscriptex/gmsrc_ex/src/gm/gmVariable.h

      - name: Boost bauen (x86_64 + i386, statisch, -fPIC)
        # From-source so the static .a is -fPIC (Debian's system .a is not) and gets
        # baked into the module -> no external libboost dependency at runtime.
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          curl -L -o boost.tar.gz https://github.com/boostorg/boost/releases/download/boost-1.84.0/boost-1.84.0.tar.gz
          tar -xf boost.tar.gz
          cd boost-1.84.0
          ./bootstrap.sh --with-libraries=system,filesystem,regex,date_time
          ./b2 -j"$(nproc)" address-model=64 cxxflags="-fPIC" link=static \
                --prefix="$GITHUB_WORKSPACE/boost64" install
          ./b2 -j"$(nproc)" address-model=32 cxxflags="-fPIC" link=static \
                --prefix="$GITHUB_WORKSPACE/boost32" install

      - name: Build x86_64
        # Static boost + static libstdc++/libgcc baked in (MODULE targets use
        # CMAKE_MODULE_LINKER_FLAGS) -> no GLIBCXX/boost runtime deps.
        run: |
          cd 0.83/Omnibot
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DOMNIBOT_ET=ON -DOMNIBOT_RTCW=ON \
            -DBOOST_ROOT="$GITHUB_WORKSPACE/boost64" \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_MODULE_LINKER_FLAGS="-static-libstdc++ -static-libgcc" \
            -DCMAKE_SHARED_LINKER_FLAGS="-static-libstdc++ -static-libgcc"
          cmake --build build -j"$(nproc)"

      - name: Build i386
        run: |
          cd 0.83/Omnibot
          cmake -S . -B build32 -DCMAKE_BUILD_TYPE=Release -DOMNIBOT_ET=ON -DOMNIBOT_RTCW=ON \
            -DBOOST_ROOT="$GITHUB_WORKSPACE/boost32" \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_C_FLAGS="-m32" -DCMAKE_CXX_FLAGS="-m32" \
            -DCMAKE_MODULE_LINKER_FLAGS="-m32 -static-libstdc++ -static-libgcc" \
            -DCMAKE_SHARED_LINKER_FLAGS="-m32 -static-libstdc++ -static-libgcc" \
            -DCMAKE_EXE_LINKER_FLAGS="-m32"
          cmake --build build32 -j"$(nproc)"

      - name: Architektur verifizieren
        run: |
          file 0.83/Omnibot/build/ET/omnibot_et.x86_64.so     | grep -q "x86-64"      || exit 1
          file 0.83/Omnibot/build32/ET/omnibot_et.so          | grep -q "Intel 80386" || exit 1
          file 0.83/Omnibot/build/RTCW/omnibot_rtcw.x86_64.so | grep -q "x86-64"      || exit 1
          file 0.83/Omnibot/build32/RTCW/omnibot_rtcw.so      | grep -q "Intel 80386" || exit 1

      - name: Verify loadable on old servers (glibc/GLIBCXX/boost)
        # Fail hard so a non-loadable lib never reaches the release.
        run: |
          set -e
          for lib in 0.83/Omnibot/build/ET/omnibot_et.x86_64.so \
                     0.83/Omnibot/build32/ET/omnibot_et.so \
                     0.83/Omnibot/build/RTCW/omnibot_rtcw.x86_64.so \
                     0.83/Omnibot/build32/RTCW/omnibot_rtcw.so; do
            echo "== $lib =="
            if objdump -T "$lib" | grep -q 'GLIBCXX_3\.4\.3'; then
              echo "FAIL: too-new GLIBCXX"; objdump -T "$lib" | grep 'GLIBCXX_3\.4\.3'; exit 1
            fi
            if objdump -p "$lib" | grep -qi 'NEEDED.*libstdc++'; then
              echo "FAIL: dynamic libstdc++ dependency"; exit 1
            fi
            if objdump -p "$lib" | grep -qi libboost; then
              echo "FAIL: dynamic boost dependency"; objdump -p "$lib" | grep -i libboost; exit 1
            fi
            hi=$(objdump -T "$lib" | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sed 's/GLIBC_//' | sort -V | tail -1)
            echo "highest glibc requirement: ${hi:-none}"
            if [ -n "$hi" ] && [ "$(printf '%s\n2.31\n' "$hi" | sort -V | tail -1)" != "2.31" ]; then
              echo "FAIL: glibc floor $hi > 2.31"; exit 1
            fi
            echo "OK: $lib"
          done

      - name: Offizielle 0.93-Pakete holen + Prüfsumme verifizieren
        run: |
          cd "$GITHUB_WORKSPACE"
          curl -fL -o et.zip   "$ET_URL"
          curl -fL -o rtcw.zip "$RTCW_URL"
          echo "$ET_SHA  et.zip"   | sha256sum -c -
          echo "$RTCW_SHA  rtcw.zip" | sha256sum -c -

      - name: Fixed win/mac/arm binaries aus dem CI-Build holen (alle 6 Plattformen)
        # The Linux libs are built+verified above. The windows/mac/arm64 libs that
        # also carry the fix come from the cmake-build "omni-bot-namefix" artifact
        # for THIS commit (its collect job assembles all 6 into the official layout).
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          API="https://api.github.com/repos/$GITHUB_REPOSITORY"
          AUTH="Authorization: Bearer $GH_TOKEN"
          RID=$(curl -fsSL -H "$AUTH" "$API/actions/workflows/cmake-build.yml/runs?head_sha=$GITHUB_SHA&status=success&per_page=1" | jq -r '.workflow_runs[0].id // empty')
          test -n "$RID" || { echo "FAIL: no successful cmake-build run for commit $GITHUB_SHA"; exit 1; }
          echo "using cmake-build run $RID"
          AURL=$(curl -fsSL -H "$AUTH" "$API/actions/runs/$RID/artifacts" | jq -r '.artifacts[] | select(.name=="omni-bot-namefix") | .archive_download_url')
          test -n "$AURL" || { echo "FAIL: omni-bot-namefix artifact missing/expired on run $RID"; exit 1; }
          curl -fsSL -H "$AUTH" -o ci-artifact.zip "$AURL"
          rm -rf ci && mkdir ci && (cd ci && unzip -q ../ci-artifact.zip)
          mkdir -p ci/et ci/rtcw
          (cd ci/et   && unzip -q ../omni-bot_0_93_namefix_ET.zip)
          (cd ci/rtcw && unzip -q ../omni-bot_0_93_namefix_RTCW.zip)

      - name: Pakete bauen (offizielles Layout, alle 6 Bot-Libs tauschen)
        run: |
          set -e
          OUT="$GITHUB_WORKSPACE/dist"; rm -rf "$OUT"; mkdir -p "$OUT"
          B="$GITHUB_WORKSPACE/0.83/Omnibot"

          # Swap every bot lib with a fixed one: the two Linux libs from our own
          # build (static, old-glibc, verified above), the rest from the CI build.
          # game=et|rtcw  src_official=et.zip  ci_dir=ci/et  out=<name>.zip
          swap_all() {
            local game="$1" official="$2" cidir="$3" outname="$4" d="$5"
            rm -rf "$d" && mkdir "$d" && (cd "$d" && unzip -q "../$official")
            cp "$B/build/$(echo $game | tr a-z A-Z)/omnibot_${game}.x86_64.so" "$d/omni-bot/omnibot_${game}.x86_64.so"
            cp "$B/build32/$(echo $game | tr a-z A-Z)/omnibot_${game}.so"      "$d/omni-bot/omnibot_${game}.so"
            # everything else (windows/mac/arm64) from CI - skip our own Linux libs
            for f in "$cidir"/omni-bot/omnibot_${game}*; do
              local base; base=$(basename "$f")
              case "$base" in
                omnibot_${game}.x86_64.so|omnibot_${game}.so) continue;;
              esac
              cp "$f" "$d/omni-bot/$base"
            done
            ls -la "$d/omni-bot/omnibot_${game}"* | awk '{print "  "$NF}'
            (cd "$d" && zip -rq "$OUT/$outname" .)
          }

          swap_all et   et.zip   ci/et   omni-bot_0_94b_namefix_ET.zip   et
          swap_all rtcw rtcw.zip ci/rtcw omni-bot_0_94b_namefix_RTCW.zip rtcw

          # --- Patch gegen offiziellen 0.93-Tag: nur erzeugen wenn nicht leer ---
          # Fetch the upstream 0.93 tag under a dedicated ref and diff our sources
          # against it. (safe.directory avoids git's "dubious ownership" refusal in
          # the container, which previously left a 0-byte patch.)
          git config --global --add safe.directory "$GITHUB_WORKSPACE" || true
          PATCH="$OUT/omnibot-namefix.patch"
          if git fetch --depth 1 https://github.com/jswigart/omni-bot.git "+refs/tags/0.93:refs/tags/omni093"; then
            git diff omni093 -- \
              0.83/Omnibot/Common/Omni-Bot.cpp \
              0.83/Omnibot/Common/IGame.cpp 0.83/Omnibot/Common/IGame.h \
              0.83/Omnibot/ET/ET_Game.cpp   0.83/Omnibot/RTCW/RTCW_Game.cpp > "$PATCH" || true
          fi
          # Ship a real diff or nothing at all - never a 0-byte file.
          if [ ! -s "$PATCH" ]; then
            echo "omnibot-namefix.patch empty / not generated - omitting"
            rm -f "$PATCH"
          fi

          cat > "$OUT/RELEASE_NOTES.md" <<'EOF'
          # Omni-bot 0.94a — Unique Bot Name fix

          Repackaged from the official 0.93 release. The base content — waypoints,
          scripts, nav, GUI, everything under omni-bot/ — is the UNCHANGED official
          0.93. Only the bot server libraries are replaced with a 0.94a build that
          carries the fix plus some diagnostics.

          Main fix: IGame::EnsureUniqueBotName() — a bot never connects under the
          (colour-stripped, case-insensitive) name of an already connected client,
          human OR bot; on a clash a numeric suffix is appended (Thor -> Thor2).
          Covers ET + RtCW.

          Code-review hardening in this build:
            - name cleaning: drop a dangling trailing '^', collapse '^^', and strip
              non-printable / control characters before comparing.
            - suffix safety: cap the result to MAX_NETNAME (36) so the engine cannot
              truncate the numeric suffix away and re-create a clash.

          New diagnostics (console channel — visible in the server log even without
          omnibot_logsize):
            - startup banner: "Omni-bot 0.94a  [Edit by Wolffiles.eu]  (<os> <arch>)".
            - per add-bot line: requested -> final name, team, class, game id; a
              clash fixup is flagged, e.g. "'Thor' -> 'Thor2' (name clash resolved)".

          Carries the fix (Linux): omnibot_et.so + omnibot_et.x86_64.so,
          omnibot_rtcw.so + omnibot_rtcw.x86_64.so.
          Stock official 0.93 (no fix): aarch64, mac and Windows binaries.

          Status: candidate fix, please test in-game. Belt and braces: keep real
          player names out of et_botnames_ext.gm and keep the [BOT] prefix on bots.
          The full source diff vs official 0.93 is included as omnibot-namefix.patch
          (when present); sources are on the 'stable' branch of wolffileseu/omni-bot.
          EOF
          sed -i 's/^          //' "$OUT/RELEASE_NOTES.md"

          ( cd "$OUT"
            if [ -f omnibot-namefix.patch ]; then
              sha256sum *.zip omnibot-namefix.patch > SHA256SUMS
            else
              sha256sum *.zip > SHA256SUMS
            fi )
          ls -la "$OUT"

      - uses: actions/upload-artifact@v4
        with: { name: omni-bot-namefix, path: dist/* }

      - name: Release (nur bei Tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          body_path: dist/RELEASE_NOTES.md
          files: |
            dist/omni-bot_0_94b_namefix_ET.zip
            dist/omni-bot_0_94b_namefix_RTCW.zip
            dist/omnibot-namefix.patch
            dist/SHA256SUMS
