name: CMake on multiple platforms

on:
  push:
    branches: [ "stable" ]
  pull_request:
    branches: [ "stable" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      # To add more build types (Release, Debug, RelWithDebInfo, etc.) customize the build_type list.
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release]
        bits: [64, 32]
        include:
          - os: ubuntu-24.04-arm
            c_compiler: gcc
            cpp_compiler: g++
            bits: 64
            arm: true
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: macos-latest
            bits: 32

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 1
        fetch-tags: true

    - name: Set reusable strings
      # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/0.83/Omnibot/build" >> "$GITHUB_OUTPUT"
        echo "build-libs-dir=${{ github.workspace }}/build/libs/download" >> "$GITHUB_OUTPUT"
        echo "BOOST_ROOT=${{ github.workspace }}/build/libs/boost-1.84.0" >> "$GITHUB_OUTPUT"

    - name: Install Linux multilib
      if: matrix.os == 'ubuntu-latest' && matrix.bits == 32
      run: |
        sudo dpkg --add-architecture i386
        sudo apt install -y gcc-multilib g++-multilib

    - name: Install boost on macos
      if: matrix.os == 'macos-latest'
      id: install-boost-macos
      run: |
        mkdir -p ${{ steps.strings.outputs.build-libs-dir }}
        cd ${{ steps.strings.outputs.build-libs-dir }}
        curl -L -O https://github.com/boostorg/boost/releases/download/boost-1.84.0/boost-1.84.0.tar.gz
        tar -xf boost-1.84.0.tar.gz
        cd boost-1.84.0
        ./bootstrap.sh --with-libraries=system,filesystem,regex,date_time
        ./b2 architecture=arm+x86 cxxflags="-arch x86_64 \
              -arch arm64 -mmacosx-version-min=10.12" \
              link=static --prefix=${{ steps.strings.outputs.BOOST_ROOT }} \
              install

    - name: Install boost on linux (arm, system pkg)
      if: matrix.os == 'ubuntu-24.04-arm'
      run: |
        sudo apt-get update
        sudo apt-get install -y libboost-system-dev libboost-filesystem-dev libboost-regex-dev libboost-date-time-dev

    - name: Install boost on linux
      if: matrix.os == 'ubuntu-latest'
      id: install-boost-linux
      run: |
        mkdir -p ${{ steps.strings.outputs.build-libs-dir }}
        cd ${{ steps.strings.outputs.build-libs-dir }}
        curl -L -O https://github.com/boostorg/boost/releases/download/boost-1.84.0/boost-1.84.0.tar.gz
        tar -xf boost-1.84.0.tar.gz
        cd boost-1.84.0
        ./bootstrap.sh --with-libraries=system,filesystem,regex,date_time
        ./b2 address-model=${{ matrix.bits }} cxxflags="-fPIC" link=static \
              --prefix=${{ steps.strings.outputs.BOOST_ROOT }} \
              install

    - name: Build boost on windows (cmake, static runtime)
      # Prebuilt boost only ships shared-runtime (/MD) libs tagged vc143, 32-bit
      # only. b2's bootstrap can't map the runner's MSVC 14.51 (VS2026) toolset
      # ("Unknown toolset: vcunk"). So build boost via its own CMake build system
      # (CMake detects MSVC 14.51 fine), static libs with static runtime (/MT) to
      # satisfy Boost_USE_STATIC_RUNTIME=ON in CMakeLists.txt.
      if: matrix.os == 'windows-latest'
      id: install-boost-windows
      shell: cmd
      run: |
        if not exist "%BUILD_LIBS%" mkdir "%BUILD_LIBS%"
        cd /d "%BUILD_LIBS%"
        curl -L -o boost.tar.gz https://github.com/boostorg/boost/releases/download/boost-1.90.0/boost-1.90.0-cmake.tar.gz
        tar -xf boost.tar.gz
        if errorlevel 1 exit /b 1
        cmake -S boost-1.90.0 -B boost-build -A %CMAKE_ARCH% ^
          -DCMAKE_BUILD_TYPE=Release ^
          -DBUILD_SHARED_LIBS=OFF ^
          -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded ^
          "-DBOOST_INCLUDE_LIBRARIES=system;filesystem;regex;date_time;thread;algorithm;array;asio;bind;dynamic_bitset;interprocess;lexical_cast;multi_array;pool;smart_ptr;static_assert" ^
          -DCMAKE_INSTALL_PREFIX="%BOOST_ROOT%"
        if errorlevel 1 exit /b 1
        cmake --build boost-build --config Release -j 4
        if errorlevel 1 exit /b 1
        cmake --install boost-build --config Release
      env:
        BUILD_LIBS: ${{ steps.strings.outputs.build-libs-dir }}
        BOOST_ROOT: ${{ steps.strings.outputs.BOOST_ROOT }}
        CMAKE_ARCH: ${{ matrix.bits == 32 && 'Win32' || 'x64' }}

    - name: Configure CMake macOS
      if: matrix.os == 'macos-latest'
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        "-DCMAKE_OSX_ARCHITECTURES=x86_64;arm64"
        -DCMAKE_OSX_DEPLOYMENT_TARGET=10.12
        -S ${{ github.workspace }}/0.83/Omnibot
      env:
        BOOST_ROOT: ${{ steps.install-boost-windows.outputs.BOOST_ROOT || steps.strings.outputs.BOOST_ROOT }}

    - name: Configure CMake Linux ARM
      # No -m32/-m64 (invalid on aarch64); system Boost (no BOOST_ROOT override).
      # Debian's static Boost .a libs are not -fPIC, so link Boost dynamically
      # (the system .so libs are PIC) to avoid "dangerous relocation" link errors.
      if: matrix.os == 'ubuntu-24.04-arm'
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DOMNIBOT_STATIC_BOOST=OFF
        -S ${{ github.workspace }}/0.83/Omnibot

    - name: Configure CMake Linux
      if: matrix.os == 'ubuntu-latest'
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_C_FLAGS=-m${{ matrix.bits }}
        -DCMAKE_CXX_FLAGS=-m${{ matrix.bits }}
        -DCMAKE_SHARED_LINKER_FLAGS=-m${{ matrix.bits }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}/0.83/Omnibot
      env:
        BOOST_ROOT: ${{ steps.install-boost-windows.outputs.BOOST_ROOT || steps.strings.outputs.BOOST_ROOT }}

    - name: Configure CMake Windows
      if: matrix.os == 'windows-latest'
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}\0.83\Omnibot
        -A ${{ matrix.bits == 32 && 'Win32' || 'x64' }}
      env:
        BOOST_ROOT: ${{ steps.install-boost-windows.outputs.BOOST_ROOT || steps.strings.outputs.BOOST_ROOT }}

    - name: Build (Unix)
      # Unix Makefiles is a single-config generator; --config is invalid there.
      if: matrix.os != 'windows-latest'
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} -j

    - name: Build (Windows)
      # Windows default generator (Visual Studio) is multi-config, so --config is required.
      if: matrix.os == 'windows-latest'
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      # Execute tests defined by the CMake configuration. Note that --build-config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest --build-config ${{ matrix.build_type }} || echo "no tests"

    - uses: actions/upload-artifact@v4
      name: Upload ET artifacts
      with:
        name: "${{ matrix.os }}-${{ matrix.bits }}bit-omnibot-ET"
        path: "${{ steps.strings.outputs.build-output-dir }}/ET/omnibot_et*"
        retention-days: 1

    - uses: actions/upload-artifact@v4
      name: Upload RTCW artifacts
      with:
        name: "${{ matrix.os }}-${{ matrix.bits }}bit-omnibot-RTCW"
        path: "${{ steps.strings.outputs.build-output-dir }}/RTCW/omnibot_rtcw*"
        retention-days: 1

  collect:
    runs-on: ubuntu-latest
    needs: [ build ]
    env:
      ET_URL:   https://github.com/jswigart/omni-bot/releases/download/0.93/omni-bot_0_93_ET.zip
      RTCW_URL: https://github.com/jswigart/omni-bot/releases/download/0.93/omni-bot_0_93_RTCW.zip
      ET_SHA:   a1b0cf22e756dcde714078cf691bebf7eadd260adffd92b6d4ec30d60925ec9b
      RTCW_SHA: 6275af05c97016636aa810b41f7521a74b09655bbf02beda83f862c831bf2418
    steps:
      - uses: actions/download-artifact@v4
        name: download all build artifacts
        with:
          path: packages
          merge-multiple: true

      - uses: geekyeggo/delete-artifact@v4
        with:
          name: |
            *bit-omnibot-*

      - name: Fetch official 0.93 packages + verify checksums
        run: |
          cd "$GITHUB_WORKSPACE"
          curl -fL -o et.zip   "$ET_URL"
          curl -fL -o rtcw.zip "$RTCW_URL"
          echo "$ET_SHA  et.zip"     | sha256sum -c -
          echo "$RTCW_SHA  rtcw.zip" | sha256sum -c -

      - name: Assemble official layout (swap in freshly-built binaries)
        # Start from the official 0.93 zip (omni-bot/ root) and overwrite each
        # platform binary with our CI build that carries the EnsureUniqueBotName
        # patch. Any platform we did NOT build keeps its stock 0.93 binary.
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          OUT="$GITHUB_WORKSPACE/dist"; rm -rf "$OUT"; mkdir -p "$OUT"

          swap() { # $1=game (et|rtcw) $2=zip $3=outzip
            local game="$1" zip="$2" outname="$3" d="stage_$1"
            rm -rf "$d" && mkdir "$d" && (cd "$d" && unzip -q "../$zip")
            local n=0
            for f in packages/omnibot_${game}*.so packages/omnibot_${game}*.dll; do
              [ -e "$f" ] || continue
              cp -v "$f" "$d/omni-bot/$(basename "$f")"
              n=$((n+1))
            done
            echo "swapped $n $game binaries"
            [ "$n" -gt 0 ] || { echo "ERROR: no $game binaries found in packages/"; exit 1; }
            (cd "$d" && zip -rq "$OUT/$outname" .)
          }

          swap et   et.zip   omni-bot_0_93_namefix_ET.zip
          swap rtcw rtcw.zip omni-bot_0_93_namefix_RTCW.zip

          ( cd "$OUT" && sha256sum *.zip > SHA256SUMS )
          ls -la "$OUT"

      - uses: actions/upload-artifact@v4
        name: Upload assembled namefix packages
        with:
          name: omni-bot-namefix
          path: dist/*
          retention-days: 7
