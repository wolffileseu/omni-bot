// ===========================================================================
// dms.cfg  -  Omni-bot DMS (Dev Menu System) key bind
//
// The M bind is OPTIONAL. The DMS menu is already reachable WITHOUT any bind:
// press ESC in-game and click the "OMNI-BOT DMS" button. This file just adds a
// one-key shortcut.
//
// It ships INSIDE omnibot_et.pk3 and is NOT auto-exec'd (a pk3 autoexec.cfg is
// unreliable - a loose autoexec.cfg in homepath shadows it). To enable the M
// shortcut, run it once from the console:
//
//     exec dms.cfg
//
// It binds M to the cgame console command "omnibotMenu", which pops up the
// "omnibot" menu (trap_UI_Popup -> UIMENU_INGAME_OMNIBOTMENU). You can also
// bind any other key directly, e.g.:  bind k "omnibotMenu"
// ===========================================================================

bind m "omnibotMenu"

echo "^2DMS:^7 'M' bound to omnibotMenu (Omni-bot Dev Menu System)"
